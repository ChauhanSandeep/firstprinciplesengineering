# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: First Principles Engineering
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  locale: en-US
  baseUrl: chauhansandeep.github.io/firstprinciplesengineering
  ignorePatterns:
    - private
    - templates
    - _drafts
    - _scratch
    - scratch
    - drafts
    - .obsidian
    - .trash
    # Defense in depth: never render a raw Excalidraw source even if one
    # somehow lands in content/.
    - "**/*.excalidraw.md"
    - "**/*.excalidraw"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      # Typography stack (per user spec):
      #   header  → Inter (600–700) for h1–h6, table headers, callout titles,
      #             and UI elements (sidebar, nav, search).
      #   body    → Atkinson Hyperlegible for body text, paragraphs, lists,
      #             table cells, and callout content. Designed for maximum
      #             character distinction / legibility on screens.
      #   code    → JetBrains Mono for code blocks and inline code.
      header: Inter
      body: Atkinson Hyperlegible
      code: JetBrains Mono
    colors:
      # Anthropic-inspired light mode — warm cream + near-black + Claude
      # orange / clay. Same warm structure as the fly hybrid, but pivoted
      # to Anthropic's signature warm-clay accent palette.
      lightMode:
        light: "#fbf6e9"          # warm cream — page background
        lightgray: "#eae2d2"      # cream surfaces / borders / card bg
        gray: "#8c7e6a"           # warm muted — secondary text / icons
        darkgray: "#5a4f40"       # warm subtext
        dark: "#1f1b16"           # near-black, warm — primary text
        secondary: "#ee6f2d"      # Anthropic orange — primary accent / links
        tertiary: "#b4532b"       # Anthropic clay — deeper second accent
        highlight: rgba(238, 111, 45, 0.08)
        textHighlight: rgba(238, 111, 45, 0.28)
      # Warm-dark companion — orange/clay lifted for dark-mode contrast
      darkMode:
        light: "#1a1714"          # warm near-black — page background
        lightgray: "#2c2823"      # lifted surfaces / borders / card bg
        gray: "#8b8273"           # warm muted
        darkgray: "#b8afa0"       # warm subtext
        dark: "#ede6d6"           # warm off-white — primary text
        secondary: "#f58a4a"      # Anthropic orange, lifted
        tertiary: "#d17654"       # Anthropic clay, lifted
        highlight: rgba(245, 138, 74, 0.12)
        textHighlight: rgba(245, 138, 74, 0.32)
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: vitesse-light
        dark: vitesse-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    options:
      layout: modern
    order: 50
    layout:
      position: right
      priority: 25
      condition: not-index
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/remove-draft
    enabled: true
  # SECOND publish gate. The sync script injects `publish: true` for
  # folder-allowlisted notes so this filter still accepts them.
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      # Strip leading `NN-` ordering prefix and convert dashes/underscores to
      # spaces so vault folders like `01-Fundamentals/01-Concepts/...` display
      # as "Fundamentals / Concepts / ...". File titles are prettified at sync
      # time, but folder names live in `fileSegmentHint` (raw segment) which
      # this mapFn cleans up at render time. Function is serialized to the
      # client and re-evaluated there (see explorer.inline.ts).
      mapFn: |
        (node) => {
          if (!node || node.displayName == null) return;
          const cleaned = String(node.displayName)
            .replace(/^\d+[-_]/, "")
            .replace(/[-_]/g, " ")
            .trim();
          if (cleaned) node.displayName = cleaned;
        }
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: false
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: afterBody
      priority: 100
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
      condition: not-index
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
      condition: not-index
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/chauhansandeep/firstprinciplesengineering
        Source (Quartz): https://github.com/jackyzha0/quartz
        RSS Feed: /firstprinciplesengineering/index.xml
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
