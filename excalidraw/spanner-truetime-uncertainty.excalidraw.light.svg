oke-linecap="round"><g transform="translate(770 270) rotate(0 0.10684640126657996 75.52507352742367)"><path d="M0.65 0.65 C0.74 25.7, 0.63 124.8, 0.67 149.72 M-0.47 -0.06 C-0.49 25.22, -0.1 125.84, 0.08 151.11" stroke="#4c9272" stroke-width="2" fill="none"></path></g></g><mask></mask><g transform="translate(750 430) rotate(0 58.5899658203125 11.25)"><text x="0" y="15.858" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="18px" fill="#4c9272" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">s (commit ts)</text></g><g stroke-linecap="round"><g transform="translate(570 400) rotate(0 99.70190956629813 0.076674776896823)"><path d="M0.26 -0.58 C33.48 -0.57, 165.99 0.61, 199.14 0.73" stroke="#4c9272" stroke-width="2.5" fill="none" stroke-dasharray="8 10"></path></g><g transform="translate(570 400) rotate(0 99.70190956629813 0.076674776896823)"><path d="M175.59 9.13 C181.38 5.22, 190.37 2.89, 199.14 0.73" stroke="#4c9272" stroke-width="2.5" fill="none"></path></g><g transform="translate(570 400) rotate(0 99.70190956629813 0.076674776896823)"><path d="M175.71 -7.97 C181.56 -6.94, 190.51 -4.34, 199.14 0.73" stroke="#4c9272" stroke-width="2.5" fill="none"></path></g></g><mask></mask><g transform="translate(600 370) rotate(0 69.45142364501953 11.25)"><text x="0" y="15.858" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="18px" fill="#4c9272" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">commit wait ≈ ε</text></g><g transform="translate(50 500) rotate(0 367.2897644042969 11.25)"><text x="0" y="15.858" font-family="Virgil, sans-serif, Segoe UI Emoji" font-size="18px" fill="#51576e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">After wait, no future TT.now().earliest can equal s — external consistency holds.</text></g></svg>