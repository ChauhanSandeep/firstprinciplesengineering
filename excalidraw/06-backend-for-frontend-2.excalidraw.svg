="start" style="white-space: pre;" direction="ltr">AGGREGATION (parallel)</text></g><g transform="translate(346 487.1477064673401) rotate(0 157.3778076171875 8.125)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="13px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">Fan out 7 downstream calls in parallel; await all</text></g><g stroke-linecap="round" transform="translate(330 523.1477064673401) rotate(0 320 30)"><path d="M0.34 -0.03 L639.25 -1.51 L640.9 61.79 L1.23 58.22" stroke="none" stroke-width="0" fill="#0d2c5a"></path><path d="M-0.62 0.5 C208.86 -1.55, 417.22 -1.34, 639.78 0.78 M0.4 0.11 C151.05 -1.8, 302.01 -1.91, 639.74 0.12 M641.64 1.48 C640.87 20.1, 639.96 37.06, 638.7 60.54 M639.68 0.97 C640.2 19.68, 640.55 37.05, 640.9 59.05 M640.09 60.42 C479.64 60.94, 320.48 60.75, -0.36 59.62 M640.34 59.91 C500.73 60.05, 360.48 59.99, 0.32 60.28 M-1.18 59.62 C0.66 35.72, 1.06 14.07, -0.91 -0.89 M0.99 59.19 C-0.29 39.07, -0.5 19.9, -0.32 0.57" stroke="#58a6ff" stroke-width="2" fill="none"></path></g><g transform="translate(346 533.1477064673401) rotate(0 98.69244384765625 9.375)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="15px" fill="#ffffff" text-anchor="start" style="white-space: pre;" direction="ltr">SHAPE TRANSFORMATION</text></g><g transform="translate(346 553.1477064673401) rotate(0 206.16676330566406 8.125)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="13px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">Drop unused fields, flatten nesting, rename per client convention</text></g><g stroke-linecap="round" transform="translate(330 589.1477064673401) rotate(0 320 30)"><path d="M-1.23 0.95 L638.42 -0.98 L638.11 59.51 L-0.17 59.2" stroke="none" stroke-width="0" fill="#3a5d1d"></path><path d="M0.53 0.59 C251.35 -1.39, 502.76 -0.02, 639.59 0.6 M-0.15 -0.15 C219.9 0.56, 439.47 0.06, 639.84 0.02 M639.89 -0.29 C638.82 18.68, 640.64 40.17, 640.57 5