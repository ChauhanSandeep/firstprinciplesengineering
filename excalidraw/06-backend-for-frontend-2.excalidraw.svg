  <rect x="0" y="0" width="1197.685546875" height="754.4237421431595" fill="#0d1117"></rect><g transform="translate(10 10) rotate(0 588.8427734375 16.875)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="27px" fill="#ff8c42" text-anchor="start" style="white-space: pre;" direction="ltr">Anatomy of a BFF  —  five responsibility layers, one client request, seven internal calls</text></g><g transform="translate(10 47) rotate(0 478.3270263671875 9.375)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="15px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">The client sees one request and one response.  Behind the BFF: parallel fan-out, shape translation, auth swap, protocol switch.</text></g><g stroke-linecap="round" transform="translate(465.79927154184554 89.00031275185825) rotate(0 140 35)"><path d="M-0.95 -1.56 L280.23 -0.65 L281.56 71.31 L-1.04 71.39" stroke="none" stroke-width="0" fill="#1f4d2b"></path><path d="M-1.47 0.41 C111.04 -0.34, 224.84 -0.58, 278.96 1.53 M-0.66 0.69 C59.52 -1.66, 118.41 -1.44, 280.13 -0.26 M281.34 1.29 C280.31 20.21, 280.82 42.48, 281.74 71.01 M280.39 -0.41 C280.28 21.01, 280.09 42.87, 279.68 69.42 M279.06 68.54 C191.03 70.51, 103.81 71.47, 0.47 69.25 M279.55 70.37 C216.01 69.72, 153.42 71.14, -0.64 70.33 M1.57 68.52 C0.45 52.75, 0.68 34.59, 1.5 -1.86 M-0.34 70.7 C1.03 49.01, 1.07 27.85, 0.1 -0.71" stroke="#3fb950" stroke-width="3" fill="none"></path></g><g transform="translate(565.807305294287 104.00031275185825) rotate(0 39.991966247558594 20)"><text x="39.991966247558594" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="16px" fill="#ffffff" text-anchor="middle" style="white-space: pre;" direction="ltr">Mobile App</text><text x="39.991966247558594" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="16px" fill="#ffffff" text-anchor="middle" style="white-space: pre;" direction="ltr">(iPhone)</text></g><g transform="translate(405 190.14770646734007) rotate(0 31.61896514892578 8.75)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="14px" fill="#3fb950" text-anchor="start" style="white-space: pre;" direction="ltr">1 request</text></g><g transform="translate(405 210.14770646734007) rotate(0 38.46497344970703 8.75)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="14px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">GET /home</text></g><g transform="translate(405 230.14770646734007) rotate(0 42.74395751953125 7.5)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#8b949e" text-anchor="start" style="white-space: pre;" direction="ltr">JWT in header</text></g><g transform="translate(723 195.14770646734007) rotate(0 34.26496124267578 8.75)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="14px" fill="#3fb950" text-anchor="start" style="white-space: pre;" direction="ltr">1 response</text></g><g transform="translate(723 215.02947330587045) rotate(0 45.53495788574219 8.75)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="14px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">~2 KB JSON</text></g><g transform="translate(723 235.02947330587045) rotate(0 71.41792297363281 15)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#8b949e" text-anchor="start" style="white-space: pre;" direction="ltr">exactly the shape</text><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#8b949e" text-anchor="start" style="white-space: pre;" direction="ltr">the home screen renders</text></g><g stroke-opacity="0.8" fill-opacity="0.8" stroke-linecap="round" transform="translate(316 289.1477064673401) rotate(0 334 190)"><path d="M-0.02 -0.3 C255.9 -0.08, 511.6 0.32, 668.66 0.79 M667.48 0.68 C669.09 142.73, 668.64 287.51, 669.13 381.04 M668.71 379.5 C420.76 377.8, 174.02 377.16, -0.11 379.29 M1.1 380.19 C1.03 243.8, 1.35 109.12, -0.01 -1.12" stroke="#a371f7" stroke-width="3.5" fill="none" stroke-dasharray="8 11"></path></g><g transform="translate(330 297.1477064673401) rotate(0 52.31996154785156 12.5)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="20px" fill="#a371f7" text-anchor="start" style="white-space: pre;" direction="ltr">Mobile BFF</text></g><g transform="translate(529.8854616248262 299.1477064673401) rotate(0 157.7743682861328 8.125)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="13px" fill="#8b949e" text-anchor="start" style="white-space: pre;" direction="ltr">owned by the iOS team  •  deployed with the app</text></g><g stroke-linecap="round" transform="translate(330 325.1477064673401) rotate(0 320 30)"><path d="M-1.83 -0.98 L639.95 0.17 L641.14 60.48 L-1.95 61.6" stroke="none" stroke-width="0" fill="#5c3a10"></path><path d="M0.02 0.46 C234.85 1.26, 469.38 0.51, 639.43 -0.16 M-0.09 -0.25 C239.1 1.81, 479.2 1.92, 639.7 -0.32 M641.79 0.92 C639.03 18.7, 641.8 40.39, 639.05 58.32 M639.03 -0.5 C641.17 20.15, 641.23 40.31, 639.29 60.81 M639.46 60.2 C412.07 61.38, 185.58 60.97, 0.76 59.41 M640.08 60.1 C451.95 57.87, 263.93 58.45, -0.08 59.9 M-0.2 60.58 C2.12 42.26, 1.93 25.09, 0.8 -0.74 M-0.75 59.43 C-0.57 35.51, -0.57 13.37, 0.88 0.49" stroke="#f0883e" stroke-width="2" fill="none"></path></g><g transform="translate(346 335.1477064673401) rotate(0 67.35746002197266 9.375)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="15px" fill="#ffffff" text-anchor="start" style="white-space: pre;" direction="ltr">EDGE PROTOCOL</text></g><g transform="translate(346 355.1477064673401) rotate(0 185.2628173828125 8.125)"><text x="0" y="NaN" font-family="Virgil, Segoe UI Emoji" font-size="13px" fill="#c9d1d9" text-anchor="start" style="white-space: pre;" direction="ltr">JSON over HTTP/2  •  client-tailored timeouts &amp; retries</text></g><g stroke-linecap="round" transform="translate(330 391.1477064673401) rotate(0 320 30)"><path d="M-1.56 -1.23 L638.5